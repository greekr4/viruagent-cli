<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Lab (CSS-first + Konva)</title>
    <script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #111a31;
        --line: #25345d;
        --text: #e5ebff;
        --muted: #a1acc9;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--text); }
      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 12px;
        padding: 12px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      h1 { font-size: 18px; margin: 0; }
      h2 { margin: 4px 0; font-size: 13px; color: #dce4ff; }
      label { font-size: 12px; color: var(--muted); }
      textarea, pre, input, button {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--line);
      }
      textarea, pre, input { background: #0d1430; color: var(--text); padding: 8px; }
      textarea { min-height: 140px; resize: vertical; }
      pre { min-height: 210px; margin: 0; overflow: auto; }
      button { background: #1c2c57; color: var(--text); padding: 8px; cursor: pointer; }
      button:hover { background: #223b72; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      #stage-wrap {
        background: #f4f7ff;
        border: 1px solid #b8c5f7;
        border-radius: 12px;
        padding: 10px;
        overflow: auto;
      }
      #container { width: 100%; min-height: 860px; }
      .hint { color: var(--muted); font-size: 12px; }
      @media (max-width: 980px) {
        .app { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="panel">
        <h1>Portfolio Lab</h1>
        <p class="hint">AI patch는 좌표 대신 CSS 유사 규칙(setTheme / setGrid / setSpacing / setText)만 바꿉니다.</p>

        <h2>AI Patch JSON</h2>
        <label>붙여넣기</label>
        <textarea id="patch-input">{"ops":[{"op":"setTheme","target":"global","values":{"primary":"#4f46e5","bg":"#f8fafc","text":"#0f172a"}},{"op":"setGrid","target":"projects","values":{"columns":2,"gap":"md"}},{"op":"setSpacing","target":"hero","values":{"gap":"lg","align":"center"}},{"op":"setText","target":"about.text","value":"제품 경험을 개선하는 AI 기반 프론트엔드 포트폴리오 빌더입니다."}]}</textarea>
        <div class="row">
          <button id="apply">Apply Patch</button>
          <button id="clear">Clear</button>
        </div>

        <h2>Quick Preset</h2>
        <div class="row">
          <button id="p1">Compact</button>
          <button id="p2">Balanced</button>
        </div>
        <div class="row">
          <button id="p3">Editorial</button>
          <button id="reset">Reset</button>
        </div>

        <h2>Export</h2>
        <div class="row">
          <input id="fileName" value="portfolio-model" />
          <button id="export-json">Export JSON</button>
        </div>
        <button id="export-png">Export PNG</button>

        <pre id="model-view"></pre>
      </aside>
      <main id="stage-wrap">
        <div id="container"></div>
      </main>
    </div>

    <script>
      const GAP = { sm: 12, md: 18, lg: 28 };
      const baseModel = {
        version: 'v1',
        canvas: { width: 980, height: 1650 },
        tokens: {
          spacing: { sm: 12, md: 18, lg: 28 },
          typography: { headingSize: 36, bodySize: 17, family: 'Arial, sans-serif' },
          colors: { primary: '#1d4ed8', text: '#0f172a', bg: '#ffffff' },
          radius: { sm: 10, md: 14, lg: 18 }
        },
        slots: {
          hero: {
            id: 'hero', order: 1,
            layout: { display: 'column', gap: 'lg', align: 'start' },
            style: { padding: 20, bg: '#eff2ff', radius: 14 },
            content: { titleKey: 'hero.title', bodyKey: 'hero.subtitle' }
          },
          about: {
            id: 'about', order: 2,
            layout: { display: 'column', gap: 'md', align: 'start' },
            style: { padding: 20, bg: '#fff', radius: 14 },
            content: { titleKey: 'about.title', bodyKey: 'about.text' }
          },
          skills: {
            id: 'skills', order: 3,
            layout: { display: 'grid', columns: 2, gap: 'sm', align: 'start' },
            style: { padding: 20, bg: '#f8fafc', radius: 14 },
            content: { titleKey: 'skills.title', itemsKey: 'skills.items' }
          },
          projects: {
            id: 'projects', order: 4,
            layout: { display: 'grid', columns: 3, gap: 'md', align: 'start' },
            style: { padding: 20, bg: '#fff', radius: 14 },
            content: { titleKey: 'projects.title', itemsKey: 'projects.items' }
          },
          contact: {
            id: 'contact', order: 5,
            layout: { display: 'column', gap: 'sm', align: 'start' },
            style: { padding: 20, bg: '#e2e8f0', radius: 14 },
            content: { titleKey: 'contact.title', itemsKey: 'contact.items' }
          }
        },
        data: {
          hero: { title: '김지훈', subtitle: 'Frontend Engineer & AI Builder' },
          about: { title: 'About', text: '실전에서 쓰는 AI 기반 웹 템플릿 편집기 제품을 만들고 있습니다.' },
          skills: { title: 'Skills', items: ['TypeScript','React','Next.js','Node.js','PostgreSQL','Konva'] },
          projects: {
            title: 'Projects',
            items: [
              { title: 'Editor AI Lab', description: 'Slot 기반 템플릿 자동 배치 엔진' },
              { title: 'Resume Builder', description: '텍스트 위주 수정 + PDF export' },
              { title: 'Portfolio Web', description: 'AI가 색상/간격/구조 추천' }
            ]
          },
          contact: { title: 'Contact', items: ['Email: hello@example.com', 'GitHub: github.com/example', 'Blog: example.dev'] }
        }
      };

      let model = JSON.parse(JSON.stringify(baseModel));
      let stage = null;
      const $ = (id) => document.getElementById(id);

      function clampColor(v) {
        return typeof v === 'string' && /^#([0-9a-fA-F]{6}|[0-9a-fA-F]{3})$/.test(v) ? v : null;
      }

      function layout(model) {
        const slots = Object.values(model.slots).sort((a,b) => a.order - b.order);
        const pad = 24;
        const contentW = model.canvas.width - pad * 2;
        const out = {};
        let y = 20;
        for (const s of slots) {
          const gap = GAP[s.layout.gap] || 18;
          const h = estimateHeight(s, model, contentW);
          out[s.id] = { x: pad, y, w: contentW, h, id: s.id };
          y += h + gap;
        }
        return { boxes: out, height: y + 20 };
      }

      function estimateHeight(slot, model, w) {
        const t = model.tokens.typography;
        if (slot.id === 'hero') return Math.max(220, 70 + 2 * t.headingSize + 0.4 * w);
        if (slot.id === 'about') {
          const text = model.data.about.text;
          return 76 + Math.min(200, text.length * 2);
        }
        if (slot.id === 'skills') return 76 + Math.ceil((model.data.skills.items.length || 0) / 2) * 34;
        if (slot.id === 'projects') return 76 + Math.ceil((model.data.projects.items.length || 0) / (slot.layout.columns || 2)) * 126;
        return 120;
      }

      function txt(x, y, w, text, size, color, align='left', bold=false) {
        return new Konva.Text({
          x, y, width: w, text,
          fontSize: size,
          fontFamily: model.tokens.typography.family,
          fill: color,
          align,
          wrap: 'word',
          fontStyle: bold ? 'bold' : 'normal'
        });
      }

      function renderSlot(group, slot, b) {
        const t = model.tokens.typography;
        const p = slot.style.padding || 20;
        const x = b.x + p;
        const y = b.y + 44;
        const w = b.w - p * 2;

        group.add(txt(x, b.y + 14, w, String(model.data[slot.id][slot.content.titleKey ? slot.content.titleKey.split('.')[1] : 'title'] || '').toUpperCase(), t.headingSize - 18, model.tokens.colors.text, slot.layout.align === 'center' ? 'center' : 'left', true));

        if (slot.id === 'hero') {
          group.add(txt(x, y + 18, w, String(model.data.hero.subtitle || ''), t.bodySize + 2, model.tokens.colors.text));
          return;
        }
        if (slot.id === 'about') {
          group.add(txt(x, y, w, String(model.data.about.text || ''), t.bodySize, model.tokens.colors.text));
          return;
        }
        if (slot.id === 'skills') {
          const gap = GAP[slot.layout.gap] || 14;
          const colW = (w - gap) / 2;
          let cx = x;
          let cy = y;
          model.data.skills.items.forEach((it, i) => {
            if (i && i % 2 === 0) { cx = x; cy += 34; }
            group.add(new Konva.Rect({
              x: cx, y: cy, width: colW, height: 24, fill: model.tokens.colors.primary, opacity: 0.14, cornerRadius: 8
            }));
            group.add(txt(cx + 8, cy + 4, colW - 16, String(it), t.bodySize - 3, model.tokens.colors.text, 'center'));
            cx = x + colW + gap;
          });
          return;
        }
        if (slot.id === 'projects') {
          const cols = slot.layout.columns || 2;
          const gap = GAP[slot.layout.gap] || 14;
          const cardW = (w - gap * (cols - 1)) / cols;
          const cardH = 108;
          model.data.projects.items.forEach((it, i) => {
            const row = Math.floor(i / cols);
            const col = i % cols;
            const px = x + col * (cardW + gap);
            const py = y + row * (cardH + gap);
            group.add(new Konva.Rect({ x: px, y: py, width: cardW, height: cardH, fill: '#f1f5f9', cornerRadius: 10, stroke: 'rgba(30,41,59,0.22)', strokeWidth: 1 }));
            group.add(txt(px + 10, py + 8, cardW - 20, String(it.title || ''), t.bodySize, model.tokens.colors.text, 'left', true));
            group.add(txt(px + 10, py + 36, cardW - 20, String(it.description || ''), t.bodySize - 4, model.tokens.colors.text));
          });
          return;
        }
        if (slot.id === 'contact') {
          const gap = GAP[slot.layout.gap] || 20;
          (model.data.contact.items || []).forEach((line, i) => {
            group.add(txt(x, y + i * gap, w, String(line), t.bodySize - 2, model.tokens.colors.text, slot.layout.align || 'left'));
          });
        }
      }

      function paint() {
        const width = Math.max(640, Math.min(1120, window.innerWidth - 390));
        model.canvas.width = width;
        const { boxes, height } = layout(model);

        if (!stage) {
          stage = new Konva.Stage({ container: 'container', width, height });
        } else {
          stage.width(width);
        }
        stage.height(Math.max(840, height + 40));
        stage.destroyChildren();
        const layer = new Konva.Layer();

        layer.add(new Konva.Rect({ x:0, y:0, width: stage.width(), height: stage.height(), fill: '#fff', stroke: '#dbe3f2', strokeWidth: 1 }));

        for (const box of Object.values(boxes)) {
          const slot = model.slots[box.id];
          const g = new Konva.Group();
          g.add(new Konva.Rect({
            x: box.x, y: box.y, width: box.w, height: box.h,
            fill: clampColor(slot.style.bg) || model.tokens.colors.bg, cornerRadius: slot.style.radius || 12,
            shadowColor: 'rgba(15,23,42,0.15)', shadowBlur: 8
          }));
          renderSlot(g, slot, box);
          g.clip({ x: box.x, y: box.y, width: box.w, height: box.h });
          layer.add(g);
        }

        stage.add(layer);
        $('model-view').textContent = JSON.stringify(model, null, 2);
      }

      function applyOp(m, op) {
        const n = JSON.parse(JSON.stringify(m));
        const target = op && op.target;
        switch (op.op) {
          case 'setTheme':
            if (target === 'global' && op.values) {
              if (op.values.primary) n.tokens.colors.primary = clampColor(op.values.primary) || n.tokens.colors.primary;
              if (op.values.text) n.tokens.colors.text = clampColor(op.values.text) || n.tokens.colors.text;
              if (op.values.bg) n.tokens.colors.bg = clampColor(op.values.bg) || n.tokens.colors.bg;
            }
            break;
          case 'setTypography':
            if (target === 'global' && op.values) {
              n.tokens.typography = { ...n.tokens.typography, ...op.values };
            }
            break;
          case 'setSpacing':
            if (n.slots[target]) {
              n.slots[target].layout = { ...n.slots[target].layout, ...op.values };
            }
            break;
          case 'setGrid':
            if (n.slots[target]) {
              n.slots[target].layout = { ...n.slots[target].layout, ...op.values, display: 'grid' };
              if (op.values && Number.isInteger(op.values.columns)) {
                n.slots[target].layout.columns = Math.max(1, Math.min(4, op.values.columns));
              }
            }
            break;
          case 'setText': {
            const [slotKey, field] = String(target || '').split('.');
            if (n.data[slotKey] && field) n.data[slotKey][field] = String(op.value ?? '');
            break;
          }
          default:
            break;
        }
        return n;
      }

      function applyPatch(jsonText) {
        let parsed;
        try { parsed = JSON.parse(jsonText || '{}'); } catch (_) { alert('JSON parse error'); return; }
        if (!Array.isArray(parsed.ops)) { alert('ops 배열이 없습니다.'); return; }
        model = parsed.ops.reduce((acc, op) => {
          if (!op || !op.op) return acc;
          return applyOp(acc, op);
        }, model);
        paint();
      }

      $('apply').addEventListener('click', () => applyPatch($('patch-input').value));
      $('clear').addEventListener('click', () => ($('patch-input').value = ''));
      $('reset').addEventListener('click', () => { model = JSON.parse(JSON.stringify(baseModel)); paint(); });

      $('p1').addEventListener('click', () => {
        const p = { ops: [
          { op: 'setTheme', target: 'global', values: { primary: '#0ea5e9', bg: '#f8fafc', text: '#0f172a' } },
          { op: 'setGrid', target: 'projects', values: { columns: 1, gap: 'lg' } },
          { op: 'setSpacing', target: 'hero', values: { gap: 'sm', align: 'center' } }
        ]};
        $('patch-input').value = JSON.stringify(p);
        applyPatch($('patch-input').value);
      });
      $('p2').addEventListener('click', () => {
        const p = { ops: [
          { op: 'setTheme', target: 'global', values: { primary: '#7c3aed', bg: '#eef2ff', text: '#1e293b' } },
          { op: 'setGrid', target: 'skills', values: { columns: 3, gap: 'sm' } },
          { op: 'setSpacing', target: 'about', values: { gap: 'lg' } }
        ]};
        $('patch-input').value = JSON.stringify(p);
        applyPatch($('patch-input').value);
      });
      $('p3').addEventListener('click', () => {
        const p = { ops: [
          { op: 'setTheme', target: 'global', values: { primary: '#10b981', bg: '#ecfdf5', text: '#0f4d3d' } },
          { op: 'setGrid', target: 'projects', values: { columns: 2, gap: 'md' } },
          { op: 'setText', target: 'about.text', value: 'AI-friendly한 CSS 규칙 기반 레이아웃 파이프라인을 테스트합니다.' }
        ]};
        $('patch-input').value = JSON.stringify(p);
        applyPatch($('patch-input').value);
      });

      $('export-json').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(model, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${$('fileName').value || 'portfolio-model'}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      });

      $('export-png').addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = stage.toDataURL({ pixelRatio: 2 });
        a.download = `${$('fileName').value || 'portfolio-lab'}.png`;
        a.click();
      });

      window.addEventListener('resize', paint);
      paint();
    </script>
  </body>
</html>
